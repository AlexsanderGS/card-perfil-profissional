<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Card Profissional</title>
  </head>
  <body>
    <main class="main-content">
      <article class="card-content">
        <button class="toggle-tema" aria-label="Botão alternar tema de fundo">
          <img src="./src/assets/icons/moon.svg" alt="" />
        </button>

        <header class="header-content">
          <img
            src="./src/assets/images/profile.jpg"
            alt="Foto de perfil de Alexsander Galvão"
          />
          <h1 class="profile-name">Alexsander Galvão</h1>
          <h2 class="profession-title">Desenvolvedor Front-End</h2>
        </header>

        <section class="card-description">
          <p class="about-text">
            Desenvolvedor Front-End, formado em Analise e Desenvolvimento de
            Sistemas. Focado no desenvolvimento com HTML, CSS e JS. Com estudos
            em React e Typescript em andamento.
          </p>
        </section>

        <section class="card-technologies">
          <ul>
            <li>
              <img src="./src/assets/icons/html.svg" alt="Ícone do HTML" />
            </li>
            <li>
              <img src="./src/assets/icons/css.svg" alt="Ícone do CSS" />
            </li>
            <li>
              <img src="./src/assets/icons/javascript.svg" alt="Ícone do JS" />
            </li>
          </ul>
        </section>

        <footer class="card-links">
          <a
            href="https://www.linkedin.com/in/alexsander-galvao/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="./src/assets/icons/linkedin.svg"
              alt="Ícone do LinkedIn"
            />
            LinkedIn
          </a>
          <a
            href="https://github.com/AlexsanderGS"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="./src/assets/icons/github.svg" alt="Ícone do Github" />
            Github
          </a>
        </footer>
      </article>
    </main>
  </body>
</html>
